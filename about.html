<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About – Ahmed Nabwy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ff-serif: 'Cormorant Garamond', Georgia, serif;
      --ff-sans: 'Jost', sans-serif;
      --max-w: 1120px;
      --nav-h: 68px;

      --bg: #111111;
      --ink: #f0eeea;
      --ink-mid: #c8c4bc;
      --ink-light: #888480;
      --rule: #2e2e2e;

      --nav-bg: #000000;
      --nav-text: #ffffff;
      --nav-hover: #aaaaaa;
      --nav-border: #222222;
    }

    body {
      font-family: var(--ff-sans);
      color: var(--ink);
      background: var(--bg);
      line-height: 1.65;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      background-color: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      display: flex;
      align-items: center;
      z-index: 100;
    }

    .nav-inner {
      max-width: var(--max-w);
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: var(--ff-serif);
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--nav-text);
      display: flex;
      flex-direction: column;
      line-height: 1;
      position: relative;
      text-decoration: none;
      z-index: 1;
    }

    .nav-logo .first {
      font-size: 1.8rem;
      font-weight: 600;
      font-variant: small-caps;
      letter-spacing: 0.22em;
    }

    .nav-logo .last {
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      opacity: 0.6;
      margin-top: 4px;
      transform: translateX(10px);
    }

    .nav-logo::before {
      content: '';
      position: absolute;
      left: -10%;
      right: -20%;
      bottom: -10px;
      height: 2px;
      background: var(--nav-text);
      opacity: 0.7;
      transform: skewX(-12deg);
      z-index: -1;
    }

    .nav-logo::after {
      content: '';
      position: absolute;
      top: 10%;
      left: -30%;
      width: 160%;
      height: 1px;
      background: var(--nav-text);
      opacity: 0.25;
      transform: rotate(6deg);
      z-index: -1;
    }

    .nav-logo:hover {
      transform: translateY(2px) rotate(0deg);
    }

    .nav-logo:hover::before {
      opacity: 1;
      height: 3px;
    }

    .nav-logo:hover .last {
      letter-spacing: 0.6em;
      opacity: 0.8;
    }

    .nav-menu {
      display: flex;
      gap: .25rem;
      list-style: none;
    }

    .nav-menu li a {
      padding: .45rem .75rem;
      font-size: .8rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--nav-text);
      text-decoration: none;
    }

    .nav-menu li a:hover {
      color: var(--nav-hover);
    }

    main {
      padding-top: var(--nav-h);
      max-width: var(--max-w);
      margin: 0 auto;
      padding-left: 2rem;
      padding-right: 2rem;
    }

    section {
      padding: 5rem 0;
    }

    .about-grid {
      display: grid;
      grid-template-columns: minmax(0,1fr) 340px;
      gap: 4rem;
      align-items: center;
    }

    h1 {
      font-family: var(--ff-serif);
      font-size: 2.6rem;
      font-weight: 300;
      margin-bottom: 2rem;
    }

    p {
      font-family: var(--ff-serif);
      font-size: 1.18rem;
      line-height: 1.75;
      color: var(--ink-mid);
      margin-bottom: 1.5rem;
      text-align: justify;
    }

    .about-photo {
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
    }

    .about-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 900px) {
      nav { position: static; height: auto; }
      main { padding-top: 0; }

      .nav-inner {
        flex-direction: column;
        gap: .8rem;
        padding: 1rem 2rem;
      }

      .nav-menu {
        flex-wrap: wrap;
        justify-content: center;
      }

      .about-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
    }
  </style>
</head>
